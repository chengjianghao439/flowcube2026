name: Deploy Browser App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Resolve deploy config
        id: deploy_config
        shell: bash
        env:
          ERP_ORIGIN_VAR: ${{ vars.VITE_ERP_PRODUCTION_ORIGIN }}
          SERVER_HOST_VAR: ${{ vars.FLOWCUBE_SERVER_HOST }}
          SERVER_USER_VAR: ${{ vars.FLOWCUBE_SERVER_USER }}
          SERVER_SSH_PORT_VAR: ${{ vars.FLOWCUBE_SERVER_SSH_PORT }}
          SERVER_APP_PATH_VAR: ${{ vars.FLOWCUBE_SERVER_APP_PATH }}
        run: |
          set -euo pipefail
          if node scripts/read-deploy-config.js >/tmp/flowcube-deploy-config.json 2>/tmp/flowcube-deploy-config.err; then
            echo "erp_origin=$(node scripts/read-deploy-config.js erpOrigin)" >> "$GITHUB_OUTPUT"
            echo "server_host=$(node scripts/read-deploy-config.js server.host)" >> "$GITHUB_OUTPUT"
            echo "server_user=$(node scripts/read-deploy-config.js server.user)" >> "$GITHUB_OUTPUT"
            echo "server_ssh_port=$(node scripts/read-deploy-config.js server.sshPort)" >> "$GITHUB_OUTPUT"
            echo "server_app_path=$(node scripts/read-deploy-config.js server.appPath)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ERP_ORIGIN="${ERP_ORIGIN_VAR:-}"
          [ -n "$ERP_ORIGIN" ] || { echo "::error::缺少部署配置：设置 deploy/production.local.json 或 GitHub Variable VITE_ERP_PRODUCTION_ORIGIN"; cat /tmp/flowcube-deploy-config.err || true; exit 1; }
          SERVER_HOST="${SERVER_HOST_VAR:-$(node -e "const u=new URL(process.argv[1]); console.log(u.hostname)" "$ERP_ORIGIN")}"
          SERVER_USER="${SERVER_USER_VAR:-root}"
          SERVER_SSH_PORT="${SERVER_SSH_PORT_VAR:-22}"
          SERVER_APP_PATH="${SERVER_APP_PATH_VAR:-/opt/flowcube}"
          echo "erp_origin=$ERP_ORIGIN" >> "$GITHUB_OUTPUT"
          echo "server_host=$SERVER_HOST" >> "$GITHUB_OUTPUT"
          echo "server_user=$SERVER_USER" >> "$GITHUB_OUTPUT"
          echo "server_ssh_port=$SERVER_SSH_PORT" >> "$GITHUB_OUTPUT"
          echo "server_app_path=$SERVER_APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Validate deploy inputs
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${{ steps.deploy_config.outputs.erp_origin }}" ] || { echo "::error::缺少 erp_origin"; exit 1; }
          [ -n "${{ steps.deploy_config.outputs.server_host }}" ] || { echo "::error::缺少 server_host"; exit 1; }
          [ -n "${{ steps.deploy_config.outputs.server_user }}" ] || { echo "::error::缺少 server_user"; exit 1; }
          [ -n "${{ steps.deploy_config.outputs.server_app_path }}" ] || { echo "::error::缺少 server_app_path"; exit 1; }
          [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ] || { echo "::error::缺少 Actions Secret: SSH_PRIVATE_KEY"; exit 1; }

      - name: Setup SSH agent
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          KEY_FILE=~/.ssh/flowcube_ci_key
          printf '%s\n' '${{ secrets.SSH_PRIVATE_KEY }}' > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          ssh-add "$KEY_FILE"

      - name: Add SSH known_hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H -p "${{ steps.deploy_config.outputs.server_ssh_port }}" "${{ steps.deploy_config.outputs.server_host }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy backend and frontend on server
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "${{ steps.deploy_config.outputs.server_ssh_port }}" "${{ steps.deploy_config.outputs.server_user }}@${{ steps.deploy_config.outputs.server_host }}" <<EOF
          set -euo pipefail
          cd "${{ steps.deploy_config.outputs.server_app_path }}"
          SKIP_RELEASE_GATE=1 bash scripts/server-update.sh
          EOF

      - name: Verify server repo moved to current commit
        shell: bash
        run: |
          set -euo pipefail
          REMOTE_SHA=$(ssh -p "${{ steps.deploy_config.outputs.server_ssh_port }}" "${{ steps.deploy_config.outputs.server_user }}@${{ steps.deploy_config.outputs.server_host }}" "cd '${{ steps.deploy_config.outputs.server_app_path }}' && git rev-parse HEAD")
          test "$REMOTE_SHA" = "$GITHUB_SHA"

      - name: Verify backend health
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "${{ steps.deploy_config.outputs.erp_origin }}/api/health" >/dev/null

      - name: Verify frontend responds
        shell: bash
        run: |
          set -euo pipefail
          HTML=$(curl -fsSL "${{ steps.deploy_config.outputs.erp_origin }}/")
          printf '%s' "$HTML" | grep -F '<title>极序 Flow</title>' >/dev/null
