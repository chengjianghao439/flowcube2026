name: Deploy Browser App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Load tracked deploy config
        id: deploy_config
        shell: bash
        run: |
          set -euo pipefail
          [ -f deploy/production.json ] || { echo "::error::缺少 deploy/production.json"; exit 1; }
          echo "erp_origin=$(node scripts/read-deploy-config.js erpOrigin)" >> "$GITHUB_OUTPUT"
          echo "server_host=$(node scripts/read-deploy-config.js server.host)" >> "$GITHUB_OUTPUT"
          echo "server_user=$(node scripts/read-deploy-config.js server.user)" >> "$GITHUB_OUTPUT"
          echo "server_ssh_port=$(node scripts/read-deploy-config.js server.sshPort)" >> "$GITHUB_OUTPUT"
          echo "server_app_path=$(node scripts/read-deploy-config.js server.appPath)" >> "$GITHUB_OUTPUT"

      - name: Validate deploy inputs
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${{ steps.deploy_config.outputs.erp_origin }}" ] || { echo "::error::deploy/production.json 缺少 erpOrigin"; exit 1; }
          [ -n "${{ steps.deploy_config.outputs.server_host }}" ] || { echo "::error::deploy/production.json 缺少 server.host"; exit 1; }
          [ -n "${{ steps.deploy_config.outputs.server_user }}" ] || { echo "::error::deploy/production.json 缺少 server.user"; exit 1; }
          [ -n "${{ steps.deploy_config.outputs.server_app_path }}" ] || { echo "::error::deploy/production.json 缺少 server.appPath"; exit 1; }
          [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ] || { echo "::error::缺少 Actions Secret: SSH_PRIVATE_KEY"; exit 1; }

      - name: Setup SSH agent
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          KEY_FILE=~/.ssh/flowcube_ci_key
          printf '%s\n' '${{ secrets.SSH_PRIVATE_KEY }}' > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          ssh-add "$KEY_FILE"

      - name: Add SSH known_hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H -p "${{ steps.deploy_config.outputs.server_ssh_port }}" "${{ steps.deploy_config.outputs.server_host }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy backend and frontend on server
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "${{ steps.deploy_config.outputs.server_ssh_port }}" "${{ steps.deploy_config.outputs.server_user }}@${{ steps.deploy_config.outputs.server_host }}" <<EOF
          set -euo pipefail
          cd "${{ steps.deploy_config.outputs.server_app_path }}"
          SKIP_RELEASE_GATE=1 bash scripts/server-update.sh
          EOF

      - name: Verify server repo moved to current commit
        shell: bash
        run: |
          set -euo pipefail
          REMOTE_SHA=$(ssh -p "${{ steps.deploy_config.outputs.server_ssh_port }}" "${{ steps.deploy_config.outputs.server_user }}@${{ steps.deploy_config.outputs.server_host }}" "cd '${{ steps.deploy_config.outputs.server_app_path }}' && git rev-parse HEAD")
          test "$REMOTE_SHA" = "$GITHUB_SHA"

      - name: Verify backend health
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "${{ steps.deploy_config.outputs.erp_origin }}/api/health" >/dev/null

      - name: Verify frontend responds
        shell: bash
        run: |
          set -euo pipefail
          HTML=$(curl -fsSL "${{ steps.deploy_config.outputs.erp_origin }}/")
          printf '%s' "$HTML" | grep -F '<title>极序 Flow</title>' >/dev/null
