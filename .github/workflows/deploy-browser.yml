name: Deploy Browser App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load tracked deploy config
        id: deploy_config
        shell: bash
        run: |
          set -euo pipefail
          [ -f deploy/production.json ] || { echo "::error::缺少 deploy/production.json"; exit 1; }
          echo "erp_origin=$(node scripts/read-deploy-config.js erpOrigin)" >> "$GITHUB_OUTPUT"
          echo "server_host=$(node scripts/read-deploy-config.js server.host)" >> "$GITHUB_OUTPUT"
          echo "server_user=$(node scripts/read-deploy-config.js server.user)" >> "$GITHUB_OUTPUT"
          echo "server_ssh_port=$(node scripts/read-deploy-config.js server.sshPort)" >> "$GITHUB_OUTPUT"
          echo "server_app_path=$(node scripts/read-deploy-config.js server.appPath)" >> "$GITHUB_OUTPUT"

      - name: Validate deploy inputs
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${{ steps.deploy_config.outputs.erp_origin }}" ] || { echo "::error::deploy/production.json 缺少 erpOrigin"; exit 1; }
          [ -n "${{ steps.deploy_config.outputs.server_host }}" ] || { echo "::error::deploy/production.json 缺少 server.host"; exit 1; }
          [ -n "${{ steps.deploy_config.outputs.server_user }}" ] || { echo "::error::deploy/production.json 缺少 server.user"; exit 1; }
          [ -n "${{ steps.deploy_config.outputs.server_app_path }}" ] || { echo "::error::deploy/production.json 缺少 server.appPath"; exit 1; }
          [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ] || { echo "::error::缺少 Actions Secret: SSH_PRIVATE_KEY"; exit 1; }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./frontend
        shell: bash
        run: |
          set -euo pipefail
          npm ci

      - name: Build frontend and capture expected asset
        id: expected
        working-directory: ./frontend
        shell: bash
        env:
          VITE_ELECTRON: 1
          VITE_ERP_PRODUCTION_ORIGIN: ${{ steps.deploy_config.outputs.erp_origin }}
        run: |
          set -euo pipefail
          npm run build
          SCRIPT_PATH=$(node -e "const fs=require('fs');const html=fs.readFileSync('dist/index.html','utf8');const m=html.match(/<script type=\"module\" crossorigin src=\"([^\"]+)\"/);if(!m) process.exit(1);process.stdout.write(m[1]);")
          CSS_PATH=$(node -e "const fs=require('fs');const html=fs.readFileSync('dist/index.html','utf8');const m=html.match(/<link rel=\"stylesheet\" crossorigin href=\"([^\"]+)\"/);if(!m) process.exit(1);process.stdout.write(m[1]);")
          echo "script_path=$SCRIPT_PATH" >> "$GITHUB_OUTPUT"
          echo "css_path=$CSS_PATH" >> "$GITHUB_OUTPUT"

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add SSH known_hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H -p "${{ steps.deploy_config.outputs.server_ssh_port }}" "${{ steps.deploy_config.outputs.server_host }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy backend and frontend on server
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "${{ steps.deploy_config.outputs.server_ssh_port }}" "${{ steps.deploy_config.outputs.server_user }}@${{ steps.deploy_config.outputs.server_host }}" <<EOF
          set -euo pipefail
          cd "${{ steps.deploy_config.outputs.server_app_path }}"
          SKIP_RELEASE_GATE=1 bash scripts/server-update.sh
          EOF

      - name: Verify backend health
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "${{ steps.deploy_config.outputs.erp_origin }}/api/health" >/dev/null

      - name: Verify frontend serves current build
        shell: bash
        run: |
          set -euo pipefail
          HTML=$(curl -fsSL "${{ steps.deploy_config.outputs.erp_origin }}/")
          printf '%s' "$HTML" | grep -F "${{ steps.expected.outputs.script_path }}" >/dev/null || {
            echo "::error::线上首页未返回当前构建的 script 资源: ${{ steps.expected.outputs.script_path }}"
            exit 1
          }
          printf '%s' "$HTML" | grep -F "${{ steps.expected.outputs.css_path }}" >/dev/null || {
            echo "::error::线上首页未返回当前构建的样式资源: ${{ steps.expected.outputs.css_path }}"
            exit 1
          }
