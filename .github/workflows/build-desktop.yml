name: Build Desktop Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.1.2)'
        required: false
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend for Electron
        working-directory: ./frontend
        run: npm run build:electron
        env:
          VITE_ELECTRON: 1

      - name: Install desktop dependencies
        working-directory: ./desktop
        run: npm install

      - name: Build desktop installer
        working-directory: ./desktop
        run: npm run dist:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FlowCube-Desktop-Setup
          path: desktop/release/*.exe
          retention-days: 30
          if-no-files-found: error

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlowCube-Desktop-Portable
          path: desktop/release/*.zip
          retention-days: 30

      - name: List built files
        run: Get-ChildItem -Path desktop/release -Filter "*.exe" | Select-Object Name, Length
        shell: pwsh