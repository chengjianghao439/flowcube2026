name: Build Desktop Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.1.2)'
        required: false
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ($tag -match '^v(.+)$') {
            $version = $matches[1]
          } else {
            $version = "0.0.0"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend for Electron
        working-directory: ./frontend
        run: npm run build:electron
        env:
          VITE_ELECTRON: 1

      - name: Install desktop dependencies
        working-directory: ./desktop
        run: npm install

      - name: Build desktop installer
        working-directory: ./desktop
        run: npm run dist:win

      - name: Rename output files (remove spaces)
        working-directory: ./desktop
        shell: pwsh
        run: |
          Get-ChildItem -Path release -Filter "*.exe" | ForEach-Object {
            $newName = $_.Name -replace ' ', '-'
            if ($_.Name -ne $newName) {
              Move-Item $_.FullName "release/$newName"
              Write-Host "Renamed: $($_.Name) -> $newName"
            }
          }
          Get-ChildItem -Path release -Filter "*.zip" | ForEach-Object {
            $newName = $_.Name -replace ' ', '-'
            if ($_.Name -ne $newName) {
              Move-Item $_.FullName "release/$newName"
              Write-Host "Renamed: $($_.Name) -> $newName"
            }
          }

      - name: List built files
        run: Get-ChildItem -Path desktop/release -Filter "*.exe" | Select-Object Name, Length
        shell: pwsh

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: FlowCube ERP ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            desktop/release/*.exe
            desktop/release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (fallback)
        uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/') == false
        with:
          name: FlowCube-Desktop-Setup
          path: desktop/release/*.exe
          retention-days: 30

      - name: Upload ZIP artifact (fallback)
        uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/') == false
        with:
          name: FlowCube-Desktop-Portable
          path: desktop/release/*.zip
          retention-days: 30