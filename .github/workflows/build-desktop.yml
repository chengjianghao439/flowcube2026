name: Build Desktop Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.1.2)'
        required: false
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ([string]::IsNullOrEmpty($tag) -or $tag -eq 'refs/heads/main') {
            $tag = "v${{ github.event.inputs.version }}"
            if ([string]::IsNullOrEmpty($tag) -or $tag -eq 'v') {
              $tag = "v0.1.2"
            }
          }
          if ($tag -match '^v(.+)$') {
            $version = $matches[1]
          } else {
            $version = "0.0.0"
            $tag = "v0.0.0"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Show directories
        run: |
          Write-Host "Current directory: $(Get-Location)"
          Write-Host "Directories:"
          Get-ChildItem -Directory | Select-Object Name

      - name: Check frontend exists
        run: |
          if (Test-Path "frontend") {
            Write-Host "frontend/ exists"
            Get-ChildItem "frontend" | Select-Object Name
          } else {
            Write-Host "ERROR: frontend/ not found"
            exit 1
          }

      - name: Check desktop exists
        run: |
          if (Test-Path "desktop") {
            Write-Host "desktop/ exists"
            Get-ChildItem "desktop" | Select-Object Name
          } else {
            Write-Host "ERROR: desktop/ not found"
            exit 1
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend for Electron
        working-directory: ./frontend
        run: npm run build:electron
        env:
          VITE_ELECTRON: 1

      - name: Verify frontend dist
        run: |
          if (Test-Path "frontend/dist") {
            Write-Host "SUCCESS: frontend/dist exists"
            Get-ChildItem "frontend/dist" | Select-Object Name
          } else {
            Write-Host "ERROR: frontend/dist not found"
            exit 1
          }

      - name: Install desktop dependencies
        working-directory: ./desktop
        run: npm install

      - name: Build desktop installer
        working-directory: ./desktop
        run: npm run dist:win

      - name: List release directory
        working-directory: ./desktop
        run: |
          if (Test-Path "release") {
            Write-Host "release/ contents:"
            Get-ChildItem "release" | Select-Object Name, Length
          } else {
            Write-Host "ERROR: release/ not found"
            exit 1
          }

      - name: Rename output files (remove spaces)
        working-directory: ./desktop
        run: |
          Get-ChildItem -Path release -Filter "*.exe" | ForEach-Object {
            $newName = $_.Name -replace ' ', '-'
            if ($_.Name -ne $newName) {
              Move-Item $_.FullName "release/$newName" -Force
              Write-Host "Renamed: $($_.Name) -> $newName"
            }
          }
          Get-ChildItem -Path release -Filter "*.zip" | ForEach-Object {
            $newName = $_.Name -replace ' ', '-'
            if ($_.Name -ne $newName) {
              Move-Item $_.FullName "release/$newName" -Force
              Write-Host "Renamed: $($_.Name) -> $newName"
            }
          }

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: FlowCube ERP ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            desktop/release/*.exe
            desktop/release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: FlowCube-Desktop-Setup
          path: desktop/release/*.exe
          retention-days: 30

      - name: Upload ZIP artifact (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: FlowCube-Desktop-Portable
          path: desktop/release/*.zip
          retention-days: 30
