# 唯一 Electron 桌面安装包构建定义。若 GitHub 上仍出现旧 workflow（含 cache: npm），请在默认分支删除 ci.yml / build.yml 等重复文件并合并此版本。
name: Build Desktop Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: '可选。填写如 0.3.2；留空则使用 desktop/package.json 的 version（与 checkout 的 main 上版本一致时最省事）'
        required: false
        type: string
      attach_to_github_release:
        description: '构建完成后将 desktop/release/*.exe 上传到已有 GitHub Release（下方填写 release_tag，如 v0.3.13）'
        required: false
        type: boolean
        default: false
      release_tag:
        description: '已有 Release 的 tag（仅当勾选 attach_to_github_release 时必填），例如 v0.3.13'
        required: false
        type: string
      checkout_ref:
        description: '可选。检出引用（补发某版本 exe 时填对应 tag，如 v0.3.13；留空则用运行界面所选分支）'
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - 'v*'

# GITHUB_TOKEN 默认可能对 contents 只读，创建 Release 会 403
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.checkout_ref != '' && github.event.inputs.checkout_ref || github.ref }}

      - name: Load tracked deploy config
        id: deploy_config
        shell: bash
        run: |
          set -euo pipefail
          [ -f deploy/production.json ] || { echo "::error::缺少 deploy/production.json"; exit 1; }
          echo "erp_origin=$(node scripts/read-deploy-config.js erpOrigin)" >> "$GITHUB_OUTPUT"
          echo "server_host=$(node scripts/read-deploy-config.js server.host)" >> "$GITHUB_OUTPUT"
          echo "server_user=$(node scripts/read-deploy-config.js server.user)" >> "$GITHUB_OUTPUT"
          echo "server_ssh_port=$(node scripts/read-deploy-config.js server.sshPort)" >> "$GITHUB_OUTPUT"
          echo "server_downloads_path=$(node scripts/read-deploy-config.js server.downloadsPath)" >> "$GITHUB_OUTPUT"

      - name: Print commit info
        shell: bash
        run: |
          echo "Commit SHA: ${{ github.sha }}"
          echo "Ref: ${{ github.ref }}"

      - name: DEBUG — step start marker (after checkout)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== START step: post-checkout DEBUG ==="
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE:-}"
          echo "GITHUB_REF=${GITHUB_REF:-}"
          echo "GITHUB_REF_NAME=${GITHUB_REF_NAME:-}"
          echo "GITHUB_EVENT_NAME=${GITHUB_EVENT_NAME:-}"
          pwd
          ls -la
          echo "=== END step: post-checkout DEBUG ==="

      - name: Print workflow info
        run: |
          Write-Host "=== START step: Print workflow info ==="
          Write-Host "========================================"
          Write-Host "  FlowCube — DESKTOP BUILD (Electron)"
          Write-Host "  (desktop workflow only)"
          Write-Host "========================================"
          Write-Host "Running Desktop Build Workflow"
          Write-Host "Ref: ${{ github.ref }}"
          Write-Host "Ref name: ${{ github.ref_name }}"
          Write-Host "Event: ${{ github.event_name }}"
          Write-Host "SHA: ${{ github.sha }}"
          Write-Host "========================================"
          Write-Host "=== END step: Print workflow info ==="
          Get-Location
          Get-ChildItem | Select-Object Name, Mode

      - name: DEBUG — after Print workflow info
        shell: bash
        run: |
          set -euo pipefail
          echo "=== DEBUG checkpoint: after Print workflow info ==="
          pwd
          ls -la

      - name: Show directories
        run: |
          Write-Host "=== START step: Show directories ==="
          Write-Host "Current directory: $(Get-Location)"
          Write-Host "Directories:"
          Get-ChildItem -Directory | Select-Object Name
          Write-Host "=== END step: Show directories ==="
          Get-Location
          Get-ChildItem | Select-Object Name, Mode

      - name: Check frontend exists
        run: |
          Write-Host "=== START step: Check frontend exists ==="
          if (Test-Path "frontend") {
            Write-Host "frontend/ exists"
            Get-ChildItem "frontend" | Select-Object Name
          } else {
            Write-Host "ERROR: frontend/ not found"
            exit 1
          }
          Write-Host "=== END step: Check frontend exists ==="
          Get-Location
          Get-ChildItem | Select-Object Name, Mode

      - name: Check desktop exists
        run: |
          Write-Host "=== START step: Check desktop exists ==="
          if (Test-Path "desktop") {
            Write-Host "desktop/ exists"
            Get-ChildItem "desktop" | Select-Object Name
          } else {
            Write-Host "ERROR: desktop/ not found"
            exit 1
          }
          Write-Host "=== END step: Check desktop exists ==="
          Get-Location
          Get-ChildItem | Select-Object Name, Mode

      - name: DEBUG — before Setup Node.js
        shell: bash
        run: |
          set -euo pipefail
          echo "=== DEBUG checkpoint: immediately BEFORE actions/setup-node ==="
          pwd
          ls -la
          test -d frontend && ls -la frontend | head -20
          test -d desktop && ls -la desktop | head -20

      # 勿使用 cache: npm：setup-node 默认在仓库根目录找 package-lock.json，本仓库锁文件在 frontend/、desktop/
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: DEBUG — after Setup Node.js
        shell: bash
        run: |
          set -euo pipefail
          echo "=== DEBUG checkpoint: immediately AFTER actions/setup-node ==="
          node -v
          npm -v
          pwd
          ls -la

      # 须在 setup-node 之后：main 分支用 package.json 解析展示用版本；发版以推 tag 为准
      - name: Resolve version and tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          EVENT="${{ github.event_name }}"
          REF_NAME="${GITHUB_REF_NAME}"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="$REF_NAME"
            VERSION="${TAG#v}"
          elif [[ "$EVENT" == "workflow_dispatch" ]]; then
            INPUT="${{ github.event.inputs.version }}"
            if [[ -z "${INPUT// }" ]]; then
              VERSION="$(node -p "require('./desktop/package.json').version")"
              TAG="v${VERSION}"
            else
              VERSION="${INPUT#v}"
              TAG="v${VERSION}"
            fi
          else
            VERSION="$(node -p "require('./desktop/package.json').version")"
            TAG="v${VERSION}"
          fi
          {
            echo "version=$VERSION"
            echo "tag=$TAG"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved version=$VERSION tag=$TAG (event=$EVENT ref=$REF_NAME)"

      - name: Verify desktop/package.json matches Git tag
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          set -euo pipefail
          TAG_VER="${GITHUB_REF_NAME#v}"
          PKG_VER="$(node -p "require('./desktop/package.json').version")"
          if [[ "$TAG_VER" != "$PKG_VER" ]]; then
            echo "::error::Git tag v${TAG_VER} 与 desktop/package.json 的 version (${PKG_VER}) 不一致，禁止构建发版"
            exit 1
          fi
          echo "OK: tag 与 package.json 均为 $PKG_VER"

      - name: Install frontend dependencies
        working-directory: ./frontend
        shell: bash
        run: |
          set -euo pipefail
          echo "=== STEP: Install frontend — START ==="
          pwd
          ls -la
          test -f package-lock.json || { echo "ERROR: frontend/package-lock.json 缺失，请提交 lock 文件"; exit 1; }
          node -e "const p=require('./package.json'); console.log('@vitejs/plugin-legacy in package.json =', p.devDependencies?.['@vitejs/plugin-legacy'])"
          npm ci
          echo "=== STEP: Install frontend — END (success) ==="
          pwd
          ls -la

      - name: DEBUG — after Install frontend
        shell: bash
        run: |
          set -euo pipefail
          echo "=== DEBUG checkpoint: after npm install (frontend) ==="
          pwd
          ls -la
          ls -la frontend | head -30

      - name: Build frontend for Electron
        working-directory: ./frontend
        shell: bash
        env:
          VITE_ELECTRON: 1
          VITE_ERP_PRODUCTION_ORIGIN: ${{ steps.deploy_config.outputs.erp_origin }}
        run: |
          set -euo pipefail
          echo "=== STEP: Build frontend — START (npm run build) ==="
          pwd
          ls -la
          npm run build
          echo "=== STEP: Build frontend — END (success) ==="
          pwd
          ls -la
          ls -la dist | head -20

      - name: DEBUG — after Build frontend
        shell: bash
        run: |
          set -euo pipefail
          echo "=== DEBUG checkpoint: after frontend build ==="
          pwd
          ls -la frontend/dist | head -30

      - name: Log frontend dist after build
        run: |
          Write-Host "=== START step: Log frontend dist ==="
          Write-Host "=== dir frontend\dist (desktop renderer build) ==="
          if (Test-Path "frontend\dist") {
            dir frontend\dist
            Get-ChildItem -Path frontend\dist -Recurse -File | Measure-Object | ForEach-Object { Write-Host "Total files: $($_.Count)" }
          } else {
            Write-Host "ERROR: frontend\dist missing"
            exit 1
          }
          Write-Host "=== END step: Log frontend dist ==="
          Get-Location
          Get-ChildItem | Select-Object Name, Mode

      - name: Install desktop dependencies
        working-directory: ./desktop
        shell: bash
        run: |
          set -euo pipefail
          echo "=== STEP: Install desktop — START ==="
          pwd
          ls -la
          test -f package-lock.json || { echo "ERROR: desktop/package-lock.json 缺失"; exit 1; }
          npm ci
          echo "=== STEP: Install desktop — END (success) ==="
          pwd
          ls -la

      - name: DEBUG — after Install desktop
        shell: bash
        run: |
          set -euo pipefail
          echo "=== DEBUG checkpoint: after npm install (desktop) ==="
          pwd
          ls -la desktop | head -30

      - name: Verify desktop main.js is current (bundle marker)
        shell: bash
        run: |
          set -euo pipefail
          grep -q '当前 main.js 已加载' desktop/main.js || { echo 'ERROR: desktop/main.js 缺少打包验证日志，避免打入旧主进程'; exit 1; }
          echo 'OK: main.js 包含「当前 main.js 已加载」标记'

      - name: Prepare fixed NSIS 3.0.4.1
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $archive = "$env:RUNNER_TEMP\nsis-3.0.4.1.7z"
          $dir = "$env:RUNNER_TEMP\nsis-3.0.4.1"
          Invoke-WebRequest -Uri "https://github.com/electron-userland/electron-builder-binaries/releases/download/nsis-3.0.4.1/nsis-3.0.4.1.7z" -OutFile $archive
          if (Test-Path $dir) {
            Remove-Item -Recurse -Force $dir
          }
          7z x -y $archive "-o$dir"
          if (-not (Test-Path "$dir\Bin\makensis.exe")) {
            throw "Fixed NSIS package missing Bin\\makensis.exe"
          }
          "ELECTRON_BUILDER_NSIS_DIR=$dir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using fixed NSIS from $dir"

      - name: Build desktop installer
        working-directory: ./desktop
        shell: bash
        env:
          VITE_ELECTRON: 1
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          set -euo pipefail
          echo "=== STEP: Build desktop — START (npm run dist:win) ==="
          pwd
          ls -la
          npm run dist:win
          echo "=== STEP: Build desktop — END (success) ==="
          pwd
          ls -la
          ls -la release | head -30

      - name: Verify exe exists
        run: |
          Write-Host "=== Verify exe exists (desktop/release/*.exe) ==="
          $exes = @(Get-ChildItem -Path "desktop/release" -Filter "*.exe" -ErrorAction SilentlyContinue)
          if ($exes.Count -eq 0) {
            Write-Host "❌ 未在 desktop/release 下发现任何 .exe"
            exit 1
          }
          Write-Host "✅ exe 已生成 ($($exes.Count) 个)"
          $exes | ForEach-Object { Write-Host "  $($_.Name) ($($_.Length) bytes)" }

      - name: Verify installer runtime is NSIS 3.04
        shell: powershell
        run: |
          $exe = Get-ChildItem -Path "desktop/release" -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $exe) {
            throw "No installer exe found for runtime verification"
          }
          $content = [System.Text.Encoding]::ASCII.GetString([System.IO.File]::ReadAllBytes($exe.FullName))
          if ($content -notmatch "Nullsoft Install System v3.04") {
            throw "Installer runtime is not NSIS v3.04"
          }
          Write-Host "✅ Verified NSIS runtime v3.04 in $($exe.Name)"

      - name: DEBUG — after Build desktop (dist:win)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== DEBUG checkpoint: after dist:win ==="
          pwd
          ls -la desktop/release

      - name: Log desktop release after build
        run: |
          Write-Host "=== START step: Log desktop release ==="
          Write-Host "=== dir desktop\release (NSIS / electron-builder output) ==="
          if (Test-Path "desktop\release") {
            dir desktop\release
            Get-ChildItem -Path desktop\release -Filter "*.exe" | ForEach-Object { Write-Host "EXE: $($_.Name) ($($_.Length) bytes)" }
          } else {
            Write-Host "ERROR: desktop\release missing"
            exit 1
          }
          Write-Host "=== END step: Log desktop release ==="
          Get-Location
          Get-ChildItem | Select-Object Name, Mode

      - name: Rename output files (remove spaces)
        working-directory: ./desktop
        run: |
          Write-Host "=== START step: Rename output files ==="
          Get-ChildItem -Path release -Filter "*.exe" | ForEach-Object {
            $newName = $_.Name -replace ' ', '-'
            if ($_.Name -ne $newName) {
              Move-Item $_.FullName "release/$newName" -Force
              Write-Host "Renamed: $($_.Name) -> $newName"
            }
          }
          Get-ChildItem -Path release -Filter "*.zip" | ForEach-Object {
            $newName = $_.Name -replace ' ', '-'
            if ($_.Name -ne $newName) {
              Move-Item $_.FullName "release/$newName" -Force
              Write-Host "Renamed: $($_.Name) -> $newName"
            }
          }
          Write-Host "=== END step: Rename output files ==="
          Get-Location
          Get-ChildItem release | Select-Object Name, Length

      # if: 中不能引用 secrets.*（会整份 workflow 校验失败）；用一步写入 output 再判断
      - name: Detect SSH deploy (SSH_PRIVATE_KEY set)
        id: ssh_deploy
        shell: bash
        run: |
          if [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      # ── 推 tag / 手动触发且已配置 SSH_PRIVATE_KEY 时：上传到服务器 backend/downloads ──
      - name: Setup SSH agent
        if: ${{ (github.ref_type == 'tag' || github.event_name == 'workflow_dispatch') && steps.ssh_deploy.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          KEY_FILE=~/.ssh/flowcube_ci_key
          printf '%s\n' '${{ secrets.SSH_PRIVATE_KEY }}' > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          ssh-add "$KEY_FILE"

      - name: Add SSH known_hosts
        if: ${{ (github.ref_type == 'tag' || github.event_name == 'workflow_dispatch') && steps.ssh_deploy.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H -p "${{ steps.deploy_config.outputs.server_ssh_port }}" "${{ steps.deploy_config.outputs.server_host }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Upload EXE to server (SCP)
        if: ${{ (github.ref_type == 'tag' || github.event_name == 'workflow_dispatch') && steps.ssh_deploy.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(desktop/release/*.exe)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "ERROR: desktop/release 下未找到 .exe"
            exit 1
          fi
          echo "=== SCP → ${{ steps.deploy_config.outputs.server_user }}@${{ steps.deploy_config.outputs.server_host }}:${{ steps.deploy_config.outputs.server_downloads_path }}/ (port ${{ steps.deploy_config.outputs.server_ssh_port }}) ==="
          for f in "${files[@]}"; do
            echo "Uploading: $f"
            scp -P "${{ steps.deploy_config.outputs.server_ssh_port }}" -o StrictHostKeyChecking=yes -o BatchMode=yes "$f" "${{ steps.deploy_config.outputs.server_user }}@${{ steps.deploy_config.outputs.server_host }}:${{ steps.deploy_config.outputs.server_downloads_path }}/"
          done
          echo "=== 上传完成；HTTP 示例: https://<API域名>/downloads/<文件名>（与 backend app.use('/downloads') 一致）==="

      # 推送 git tag：创建/更新 GitHub Release 并附上 exe
      - name: Upload EXE to Release
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: FlowCube ERP ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: 'true'
          fail_on_unmatched_files: true
          files: desktop/release/*.exe

      # 手动运行：补传 exe 到已存在的 Release（例如先用 gh release create 建了空 Release、或 tag 构建失败）
      - name: Upload EXE to existing Release (workflow_dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.attach_to_github_release == 'true' && github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          draft: false
          prerelease: false
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: desktop/release/*.exe

      - name: DEBUG — before upload-artifact (exe)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== DEBUG checkpoint: before Upload Windows Setup EXE artifact ==="
          pwd
          ls -la desktop/release

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: FlowCube-Desktop-Setup
          path: desktop/release/*.exe
          if-no-files-found: error
          retention-days: 30

      # 当前 win 目标多为 NSIS 仅 .exe；无 zip 时用 warn 记录日志且 job 仍成功（与「忽略 || true」不同，仍会输出警告）
      - name: Upload portable ZIP artifact (optional)
        uses: actions/upload-artifact@v7
        with:
          name: FlowCube-Desktop-Portable
          path: desktop/release/*.zip
          if-no-files-found: warn
          retention-days: 30
