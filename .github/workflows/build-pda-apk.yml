name: Build PDA APK

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "可选。构建指定分支 / tag / commit；留空则使用当前默认分支"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-pda:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref != '' && github.event.inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Sync Capacitor Android project
        working-directory: ./frontend
        env:
          VITE_CAPACITOR: 1
          VITE_ERP_PRODUCTION_ORIGIN: ${{ vars.VITE_ERP_PRODUCTION_ORIGIN }}
        run: npm run pda:sync

      - name: Prepare Android signing keystore
        working-directory: ./frontend/android/app
        env:
          PDA_SIGNING_KEYSTORE_BASE64: ${{ secrets.PDA_SIGNING_KEYSTORE_BASE64 }}
        run: |
          test -n "$PDA_SIGNING_KEYSTORE_BASE64"
          printf '%s' "$PDA_SIGNING_KEYSTORE_BASE64" | base64 --decode > flowcube-release.keystore

      - name: Build release APK
        working-directory: ./frontend/android
        env:
          FLOWCUBE_UPLOAD_STORE_FILE: flowcube-release.keystore
          FLOWCUBE_UPLOAD_STORE_PASSWORD: ${{ secrets.PDA_SIGNING_STORE_PASSWORD }}
          FLOWCUBE_UPLOAD_KEY_ALIAS: ${{ secrets.PDA_SIGNING_KEY_ALIAS }}
          FLOWCUBE_UPLOAD_KEY_PASSWORD: ${{ secrets.PDA_SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mkdir -p out
          cp frontend/android/app/build/outputs/apk/release/app-release.apk "out/FlowCubePDA-${GITHUB_SHA::7}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flowcube-pda-apk
          path: out/*.apk
          if-no-files-found: error
