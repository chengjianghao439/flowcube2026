name: Build PDA APK

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-pda-apk.yml'
      - 'frontend/**'
      - 'backend/apk/version.json'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-pda:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Load tracked deploy config
        id: deploy_config
        shell: bash
        run: |
          set -euo pipefail
          [ -f deploy/production.json ] || { echo "::error::缺少 deploy/production.json"; exit 1; }
          echo "erp_origin=$(node scripts/read-deploy-config.js erpOrigin)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Sync Capacitor Android project
        working-directory: ./frontend
        env:
          VITE_CAPACITOR: 1
          VITE_ERP_PRODUCTION_ORIGIN: ${{ steps.deploy_config.outputs.erp_origin }}
        run: npm run pda:sync

      - name: Prepare Android signing keystore
        working-directory: ./frontend/android/app
        env:
          PDA_SIGNING_KEYSTORE_BASE64: ${{ secrets.PDA_SIGNING_KEYSTORE_BASE64 }}
        run: |
          test -n "$PDA_SIGNING_KEYSTORE_BASE64"
          printf '%s' "$PDA_SIGNING_KEYSTORE_BASE64" | base64 --decode > flowcube-release.keystore

      - name: Build release APK
        working-directory: ./frontend/android
        env:
          FLOWCUBE_UPLOAD_STORE_FILE: flowcube-release.keystore
          FLOWCUBE_UPLOAD_STORE_PASSWORD: ${{ secrets.PDA_SIGNING_STORE_PASSWORD }}
          FLOWCUBE_UPLOAD_KEY_ALIAS: ${{ secrets.PDA_SIGNING_KEY_ALIAS }}
          FLOWCUBE_UPLOAD_KEY_PASSWORD: ${{ secrets.PDA_SIGNING_KEY_PASSWORD }}
        run: ./gradlew clean assembleRelease

      - name: Verify APK version
        shell: bash
        run: |
          set -euo pipefail
          APK_PATH="frontend/android/app/build/outputs/apk/release/app-release.apk"
          test -f "$APK_PATH"
          EXPECTED_NAME="$(python3 - <<'PY'
          import re, pathlib
          text = pathlib.Path('frontend/android/app/build.gradle').read_text()
          m = re.search(r'versionName\s+"([^"]+)"', text)
          print(m.group(1) if m else '')
          PY
          )"
          EXPECTED_CODE="$(python3 - <<'PY'
          import re, pathlib
          text = pathlib.Path('frontend/android/app/build.gradle').read_text()
          m = re.search(r'versionCode\s+(\d+)', text)
          print(m.group(1) if m else '')
          PY
          )"
          test -n "$EXPECTED_NAME"
          test -n "$EXPECTED_CODE"
          APKANALYZER="$(find "${ANDROID_HOME:-/usr/local/lib/android/sdk}" -name apkanalyzer | head -n 1)"
          test -n "$APKANALYZER"
          ACTUAL_NAME="$("$APKANALYZER" manifest version-name "$APK_PATH")"
          ACTUAL_CODE="$("$APKANALYZER" manifest version-code "$APK_PATH")"
          echo "Expected versionName=$EXPECTED_NAME versionCode=$EXPECTED_CODE"
          echo "Actual   versionName=$ACTUAL_NAME versionCode=$ACTUAL_CODE"
          test "$ACTUAL_NAME" = "$EXPECTED_NAME"
          test "$ACTUAL_CODE" = "$EXPECTED_CODE"

      - name: Rename APK
        run: |
          mkdir -p out
          cp frontend/android/app/build/outputs/apk/release/app-release.apk "out/FlowCubePDA-${GITHUB_SHA::7}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: flowcube-pda-apk
          path: out/*.apk
          if-no-files-found: error
