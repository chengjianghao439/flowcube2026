name: Build Print Client

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 勿使用 cache: npm：锁文件在 frontend/ 等子目录，根目录无 package-lock.json
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install pkg
        run: npm install -g pkg

      - name: Build Windows executable
        run: |
          cd frontend
          pkg print-client.cjs --targets node18-win-x64 --output FlowCubePrintClient.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: print-client-build
          path: |
            frontend/FlowCubePrintClient.exe
            frontend/config.json
