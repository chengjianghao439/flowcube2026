version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: flowcube-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${DB_NAME:?DB_NAME is required}
      MYSQL_USER: ${DB_USER:?DB_USER is required}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/database:/docker-entrypoint-initdb.d
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: flowcube-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      CORS_REFLECT: ${CORS_REFLECT:-0}
      CORS_ALLOW_NULL_ORIGIN: ${CORS_ALLOW_NULL_ORIGIN:-0}
      TRUST_PROXY: ${TRUST_PROXY:-0}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-}
      APP_UPDATE_DOWNLOADS_DIR: /var/www/flowcube-downloads
    ports:
      - "3000:3000"
    volumes:
      # 桌面发布目录只允许指向 canonical host path；backend/downloads 已废弃，禁止作为默认 fallback。
      - ${FLOWCUBE_DOWNLOADS_DIR:-/var/www/flowcube-downloads}:/var/www/flowcube-downloads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: flowcube-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      # nginx 只暴露 canonical downloads root，下游路径为 /latest.json、/versions/、/current/。
      - ${FLOWCUBE_DOWNLOADS_DIR:-/var/www/flowcube-downloads}:/usr/share/nginx/downloads:ro

volumes:
  mysql_data:
