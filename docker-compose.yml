version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: flowcube-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-flowcube123}
      MYSQL_DATABASE: ${DB_NAME:-flowcube}
      MYSQL_USER: ${DB_USER:-flowcube}
      MYSQL_PASSWORD: ${DB_PASSWORD:-flowcube123}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/database:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: flowcube-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-flowcube}
      DB_PASSWORD: ${DB_PASSWORD:-flowcube123}
      DB_NAME: ${DB_NAME:-flowcube}
      # app.js 要求长度 ≥32；仅本地试跑可用默认值，上线必须在 .env 覆盖
      JWT_SECRET: ${JWT_SECRET:-flowcube-docker-dev-only-secret-32chars-min}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      CORS_REFLECT: ${CORS_REFLECT:-0}
      CORS_ALLOW_NULL_ORIGIN: ${CORS_ALLOW_NULL_ORIGIN:-0}
      TRUST_PROXY: ${TRUST_PROXY:-0}
      # 桌面端更新：同域下载安装包（与仓库根 .env 中 APP_PUBLIC_URL 一致）
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-}
    ports:
      - "3000:3000"
    volumes:
      # 安装包 .exe 不入库，挂到宿主机便于上传/替换
      - ./backend/downloads:/app/downloads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: flowcube-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
