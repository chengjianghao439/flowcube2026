server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # 入口页不要缓存，避免发布后继续引用旧 hash 资源
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # hash 资源可长期缓存，减少重复下载
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # 前端路由
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ /index.html;
    }

    # 反向代理后端 API
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fc_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
    }

    # 安装包与更新清单：由 nginx 直接静态提供，避免大文件经后端代理中途断流
    location = /latest.json {
        alias /usr/share/nginx/downloads/latest.json;
        add_header Cache-Control "no-store" always;
    }

    location /versions/ {
        alias /usr/share/nginx/downloads/versions/;
        autoindex off;
    }

    location /current/ {
        alias /usr/share/nginx/downloads/current/;
        autoindex off;
        add_header Cache-Control "no-store" always;
    }

    # DEPRECATED: 仅兼容旧客户端或旧 manifest 中的 /downloads/ 链接。
    # 新发布源必须使用 /versions/ 与 /current/；计划 v0.5.0 后按访问日志退场。
    location /downloads/ {
        limit_except GET {
            deny all;
        }
        alias /usr/share/nginx/downloads/;
        autoindex off;
        add_header Warning '299 FlowCube "/downloads is deprecated; use /versions or /current"' always;
        add_header X-FlowCube-Deprecated-Alias "/downloads; use /versions or /current" always;
    }
}
