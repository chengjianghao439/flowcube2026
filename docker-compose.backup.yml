# ─────────────────────────────────────────────────────────────────────────────
# FlowCube Docker 备份服务 Compose Override
#
# 用途：在 Docker 部署环境中运行全自动备份容器（开箱即用，无需宿主机 cron）
#
# 使用方式（与主 compose 合并启动）：
#   docker compose -f docker-compose.yml -f docker-compose.backup.yml up -d
#
# 单独启动备份服务（主服务已运行时）：
#   docker compose -f docker-compose.yml -f docker-compose.backup.yml up -d backup
#
# 查看备份日志：
#   docker logs -f flowcube-backup
#
# 手动触发一次备份：
#   docker exec flowcube-backup sh /docker-backup-entrypoint.sh cron-run
#
# 环境变量（可在 .env 中覆盖）：
#   KEEP_DAYS     备份保留天数（默认 7）
#   BACKUP_CRON   cron 表达式（默认每天 02:00 = "0 2 * * *"）
# ─────────────────────────────────────────────────────────────────────────────

version: '3.9'

services:
  backup:
    image: alpine:3.19
    container_name: flowcube-backup
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    # 安装 mysql-client，挂载入口脚本，启动备份服务
    command: >
      sh -c "
        apk add --no-cache mysql-client bash tzdata > /dev/null 2>&1 &&
        cp /timezone-setup /tmp/tz-done &&
        ln -sf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime &&
        echo 'Asia/Shanghai' > /etc/timezone &&
        chmod +x /docker-backup-entrypoint.sh &&
        /docker-backup-entrypoint.sh
      "
    volumes:
      # 备份文件持久化到宿主机
      - ./backups/daily:/backups
      # 只读挂载入口脚本
      - ./docker/backup-entrypoint.sh:/docker-backup-entrypoint.sh:ro
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-flowcube}
      DB_PASSWORD: ${DB_PASSWORD:-flowcube123}
      DB_NAME: ${DB_NAME:-flowcube}
      KEEP_DAYS: ${KEEP_DAYS:-7}
      BACKUP_CRON: ${BACKUP_CRON:-0 2 * * *}
      TZ: Asia/Shanghai
    networks:
      - default
    # 备份容器无需对外暴露端口
    # 资源限制（避免备份过程影响主服务）
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
